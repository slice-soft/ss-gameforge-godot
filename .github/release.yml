changelog:
  exclude:
    labels:
      - ignore-for-release
      - dependencies
      - skip-changelog
  categories:
    - title: 🚀 New Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Bug Fixes
      labels:
        - bug
        - fix
    - title: 📚 Documentation
      labels:
        - documentation
        - docs
    - title: 🔧 Maintenance & Refactoring
      labels:
        - refactor
        - chore
        - maintenance
    - title: ⚡ Performance Improvements
      labels:
        - performance
    - title: 🎨 UI/UX Improvements
      labels:
        - ui
        - ux
    - title: 💥 Breaking Changes
      labels:
        - breaking-change
    - title: 🧩 Other Changes
      labels:
        - "*"
